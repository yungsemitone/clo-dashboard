app = "clo-dashboard"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8501
  force_https = true
  # Always-on: keep one machine running and never auto-stop it on idle.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/_stcore/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
