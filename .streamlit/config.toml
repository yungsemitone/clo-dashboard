# Warm-dark editorial theme (matches the "Morning Desk" look).
[theme]
base = "dark"
primaryColor = "#C25361"             # claret — buttons, active states, focus
backgroundColor = "#1A1513"          # warm near-black page
secondaryBackgroundColor = "#251D19" # cards, inputs, widgets
textColor = "#F3ECE3"                # warm ink
linkColor = "#CBA255"                # gold links
borderColor = "#3A2F28"
showWidgetBorder = true
baseRadius = "14px"
font = "Libre Franklin, system-ui, sans-serif"
headingFont = "Fraunces, Georgia, serif"
codeFont = "IBM Plex Mono, monospace"

[theme.sidebar]
backgroundColor = "#211A17"
secondaryBackgroundColor = "#251D19"

[server]
headless = true
port = 8501

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
