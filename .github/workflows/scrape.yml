name: CLO Scraper - Daily Run

on:
  schedule:
    # Run twice daily: 6 AM and 6 PM ET (10:00 and 22:00 UTC)
    - cron: '0 10 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download previous database
        uses: actions/download-artifact@v4
        with:
          name: clo-database
          path: data/
        continue-on-error: true  # First run won't have a previous db

      - name: Initialize database
        run: |
          mkdir -p data/raw data/processed data/exports/csv data/exports/excel logs
          python -c "
          from src.db import init_db
          import yaml
          with open('config.yaml') as f:
              config = yaml.safe_load(f)
          init_db(config)
          print('Database initialized.')
          "

      - name: Run SEC EDGAR scraper
        run: python main.py scrape --trustee sec_edgar --limit 50
        env:
          PYTHONPATH: .

      - name: Export to CSV
        run: python main.py export --format both
        env:
          PYTHONPATH: .

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: clo-database
          path: data/clo_data.db
          retention-days: 90

      - name: Upload exports
        uses: actions/upload-artifact@v4
        with:
          name: clo-exports-${{ github.run_number }}
          path: data/exports/
          retention-days: 30

      - name: Commit updated database
        run: |
          git config user.name "CLO Scraper Bot"
          git config user.email "bot@clo-scraper.local"
          git add data/clo_data.db data/exports/ || true
          git diff --cached --quiet || git commit -m "Auto-update: scraped $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Push failed - may need to pull first"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
