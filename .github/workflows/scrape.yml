name: Refresh CLO data

# NPORT-P filings are quarterly, filed on staggered dates across the five funds.
# A weekly run catches new filings within a week of posting without hammering EDGAR.
# Trigger manually any time via the "Run workflow" button (workflow_dispatch).
on:
  schedule:
    - cron: '0 11 * * 1'   # Mondays 11:00 UTC (~6-7am ET)
  workflow_dispatch:

# Required so the committed-DB push below can write back to the repo.
# NOTE: repo Settings → Actions → General → Workflow permissions must also be
# set to "Read and write permissions" for this token to be allowed to push.
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Re-scrape EDGAR (rebuilds data/clo_data.db from the latest filings)
        run: python run_pipeline.py
        env:
          PYTHONPATH: .

      - name: Sanity-check the rebuilt database
        # Guard against committing a broken/partial scrape (EDGAR hiccup, format
        # change). Current real data is ~749 deals / ~2,686 holdings; fail well
        # below that so a degraded run never overwrites good committed data.
        run: |
          python -c "
          import sqlite3, sys
          c = sqlite3.connect('data/clo_data.db')
          deals = c.execute('select count(*) from deals').fetchone()[0]
          holdings = c.execute('select count(*) from fund_holdings').fetchone()[0]
          print(f'deals={deals} holdings={holdings}')
          if deals < 400 or holdings < 1500:
              sys.exit('Scrape produced too little data — refusing to commit.')
          "

      - name: Commit and push if the database changed
        run: |
          git config user.name "CLO Scraper Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/clo_data.db
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "Auto-refresh CLO data $(date -u +'%Y-%m-%d')"
            git push
          fi
